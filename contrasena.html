<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title>Generador de contraseñas</title>
  <link rel="stylesheet"
        href="./css/estilos.css" />
</head>
<body>
  <main class="pagina">
  <a href="./index.html"
  class="enlace-volver">
  ← Volver
  </a>
    <section class="tarjeta">
      <h1>Generador de contraseñas</h1>
      <label for="longitud">
        Longitud de la contraseña
      </label>
      <input type="number"
             id="longitud"
             min="12"
             max="50"
             value="16" />
      <button id="boton-generar">
        Generar contraseña
      </button>
      <p id="resultado"
         class="resultado-contrasena">
      </p>
    </section>
  </main>
  <script src="./js/fondos.js"></script>
  <script src="./js/contrasena.js"></script>

</body>
</html>
